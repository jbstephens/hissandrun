<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hiss &amp; Run">
<title>Hiss &amp; Run</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://ses.q5labs.co/lib/controller.js"></script>
<style>
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #14121f;
    font-family: "Press Start 2P", monospace;
    color: #fff;
    touch-action: none;
  }
  #stage {
    position: fixed; left: 50%; top: 50%;
    width: 1280px; height: 720px;
    transform-origin: 0 0;
  }
  #game { position: absolute; inset: 0; display: block; }

  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 18px 26px 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none;
    text-shadow: 0 3px 0 rgba(0,0,0,0.55);
  }
  #hud.hidden { display: none; }
  #hudLen {
    font-size: 15px; color: #b9f66e;
    background: rgba(10, 24, 8, 0.55);
    border: 3px solid rgba(150, 235, 90, 0.5);
    border-radius: 10px;
    padding: 10px 14px 8px;
    text-shadow: 0 2px 0 rgba(0,0,0,0.6);
  }
  #hudLen .mult { color: #ffd23f; font-size: 11px; display: block; margin-top: 7px; }
  #hudScore { font-size: 30px; color: #fff; padding-top: 4px; letter-spacing: 2px; }
  #hudBest { font-size: 12px; color: #9ad0ff; text-align: right; padding-top: 8px; line-height: 1.7; }

  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    background: radial-gradient(ellipse at 50% 42%, rgba(16,26,14,0.42) 0%, rgba(8,8,16,0.78) 100%);
  }
  .screen.hidden { display: none; }
  .screen h1 {
    font-size: 58px; line-height: 1.15;
    color: #a7f25f;
    text-shadow: 0 5px 0 #2c6b25, 0 10px 0 rgba(0,0,0,0.45), 0 0 34px rgba(140,240,90,0.35);
    margin-bottom: 26px;
  }
  .screen h1 .amp { color: #ffd23f; text-shadow: 0 5px 0 #8a5f10, 0 10px 0 rgba(0,0,0,0.45); }
  #over h1 {
    color: #ff6a5e;
    text-shadow: 0 5px 0 #7c1f16, 0 10px 0 rgba(0,0,0,0.45), 0 0 34px rgba(255,90,70,0.3);
  }
  .screen .tag { font-size: 13px; color: #cfe8b8; margin-bottom: 40px; line-height: 1.9; text-shadow: 0 2px 0 rgba(0,0,0,0.6); }
  .screen .stats { font-size: 16px; color: #fff; line-height: 2.1; margin-bottom: 34px; text-shadow: 0 3px 0 rgba(0,0,0,0.55); }
  .screen .stats .best { color: #9ad0ff; font-size: 12px; }
  .screen .stats .newbest { color: #ffd23f; font-size: 13px; }
  .screen .go { font-size: 17px; color: #ffd23f; text-shadow: 0 3px 0 rgba(0,0,0,0.6); animation: blink 1.15s steps(2) infinite; }
  .screen .hint { font-size: 9px; color: #9fb8a0; margin-top: 44px; line-height: 2.2; text-shadow: 0 2px 0 rgba(0,0,0,0.6); }
  @keyframes blink { 50% { opacity: 0.15; } }

  #paused { background: rgba(8, 8, 16, 0.68); }
  #paused h1 { color: #9ad0ff; text-shadow: 0 5px 0 #22436b, 0 10px 0 rgba(0,0,0,0.45); font-size: 44px; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game" width="1280" height="720"></canvas>
  <div id="hud" class="hidden">
    <div id="hudLen">LEN 3<span class="mult">SCORE ×3</span></div>
    <div id="hudScore">0</div>
    <div id="hudBest">BEST<br>0</div>
  </div>
  <div id="title" class="screen">
    <h1>HISS <span class="amp">&amp;</span> RUN</h1>
    <p class="tag">ONLY YOUR HEAD HAS TO MAKE IT.<br>YOUR BODY IS ANOTHER STORY.</p>
    <p class="go" id="titleGo">PRESS START</p>
    <p class="hint">HOLD A DIRECTION TO SLITHER &middot; RELEASE TO STOP<br>EAT SNACKS TO GROW &middot; LONGER = MORE POINTS &middot; GUARD YOUR TAIL</p>
  </div>
  <div id="over" class="screen hidden">
    <h1 id="overTitle">RUN OVER</h1>
    <p class="stats" id="overStats"></p>
    <p class="go">PRESS X OR ENTER TO SLITHER AGAIN</p>
  </div>
  <div id="paused" class="screen hidden">
    <h1>PAUSED</h1>
    <p class="go">START / P TO RESUME</p>
  </div>
</div>
<script>
'use strict';
(function () {

/* ============================================================
 * Hiss & Run — Snake x Frogger for the Stephens Arcade.
 * Oblique fake-3D toy world. Everything pre-rendered at load;
 * the per-frame hot path is drawImage + transforms only.
 * ============================================================ */

// ---------- projection ----------
// A = one step along a lane (+gx): right and slightly up.
// B = one step forward   (+gy): up and slightly right.
const AX = 58, AY = -12, BX = 21, BY = -46;
const OX = 145, OY = 760;
const COLS = 13;                    // playable gx 0..12
const STRIP_GX0 = -8, STRIP_N = 28; // baked ground strips cover gx -8..19
const PADX = 6, LY0 = 470;
const STRIP_W = PADX * 2 + (STRIP_N - 1) * AX + AX + BX; // 1657
const STRIP_H = LY0 + 34;
const GRASS_ELEV = 6;
const W = 1280, H = 720;

const MOVE_DUR = 0.135;   // seconds per tile while a direction is held
const SPACING = 0.62;     // body segment spacing in tiles (overlap = glossy tube)
const MAXSEG = 42;
const START_LEN = 3;
const BEST_KEY = 'hissrun_best';

// ---------- tiny utils ----------
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;

function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const urlParams = new URLSearchParams(location.search);
const SEED_PARAM = urlParams.get('seed');
let rng = mulberry32(SEED_PARAM ? (SEED_PARAM | 0) : ((Date.now() * 2654435761) >>> 8));

function makeC(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return c;
}
function shade(col, f) {
  let r, g, b;
  if (col[0] === '#') {
    const n = parseInt(col.slice(1), 16);
    r = (n >> 16) & 255; g = (n >> 8) & 255; b = n & 255;
  } else { // 'rgb(r,g,b)'
    const m = col.match(/(\d+)[^\d]+(\d+)[^\d]+(\d+)/);
    r = +m[1]; g = +m[2]; b = +m[3];
  }
  r = clamp(r * f, 0, 255) | 0;
  g = clamp(g * f, 0, 255) | 0;
  b = clamp(b * f, 0, 255) | 0;
  return `rgb(${r},${g},${b})`;
}
function poly(g, pts) {
  g.beginPath();
  g.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) g.lineTo(pts[i][0], pts[i][1]);
  g.closePath(); g.fill();
}
// A chunky 3D block in world-oblique space (used only during baking).
// (x,y) = near-left ground corner; aLen/bLen in tiles; h in px.
function block(g, x, y, aLen, bLen, h, col, topBoost) {
  const ax = aLen * AX, ay = aLen * AY, bx = bLen * BX, by = bLen * BY;
  g.fillStyle = shade(col, 0.62);   // front face (toward viewer)
  poly(g, [[x, y - h], [x + ax, y + ay - h], [x + ax, y + ay], [x, y]]);
  g.fillStyle = shade(col, 0.82);   // left end face
  poly(g, [[x, y - h], [x + bx, y + by - h], [x + bx, y + by], [x, y]]);
  g.fillStyle = shade(col, topBoost || 1.0); // top face
  poly(g, [[x, y - h], [x + ax, y + ay - h], [x + ax + bx, y + ay + by - h], [x + bx, y + by - h]]);
}
// parallelogram flat on the ground (top face only)
function flat(g, x, y, aLen, bLen, col) {
  const ax = aLen * AX, ay = aLen * AY, bx = bLen * BX, by = bLen * BY;
  g.fillStyle = col;
  poly(g, [[x, y], [x + ax, y + ay], [x + ax + bx, y + ay + by], [x + bx, y + by]]);
}
function shadowBlob(g, x, y, rx, ry, alpha) {
  const gr = g.createRadialGradient(x, y, 0, x, y, rx);
  gr.addColorStop(0, `rgba(12,12,34,${alpha})`);
  gr.addColorStop(0.72, `rgba(12,12,34,${alpha * 0.82})`);
  gr.addColorStop(1, 'rgba(12,12,34,0)');
  g.save();
  g.translate(x, y); g.scale(1, ry / rx); g.translate(-x, -y);
  g.fillStyle = gr;
  g.beginPath(); g.arc(x, y, rx, 0, Math.PI * 2); g.fill();
  g.restore();
}

// ---------- audio (lazy synth) ----------
let AC = null, master = null, noiseBuf = null;
function audioInit() {
  if (!AC) {
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      master = AC.createGain(); master.gain.value = 0.38; master.connect(AC.destination);
      noiseBuf = AC.createBuffer(1, AC.sampleRate * 0.6, AC.sampleRate);
      const d = noiseBuf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    } catch (e) { AC = null; }
  }
  if (AC && AC.state === 'suspended') { try { AC.resume(); } catch (e) {} }
}
function tone(freq, dur, type, vol, slideTo, delay) {
  if (!AC) return;
  const t0 = AC.currentTime + (delay || 0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(30, slideTo), t0 + dur);
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(master);
  o.start(t0); o.stop(t0 + dur + 0.03);
}
function noiseHit(dur, vol, lp, delay) {
  if (!AC) return;
  const t0 = AC.currentTime + (delay || 0);
  const s = AC.createBufferSource(); s.buffer = noiseBuf;
  const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lp;
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  s.connect(f); f.connect(g); g.connect(master);
  s.start(t0); s.stop(t0 + dur + 0.03);
}
const sfx = {
  start()   { tone(392, 0.09, 'square', 0.16); tone(523, 0.09, 'square', 0.16, 0, 0.09); tone(784, 0.16, 'square', 0.18, 0, 0.18); },
  eat()     { tone(620, 0.07, 'square', 0.15, 900); tone(980, 0.1, 'square', 0.12, 1400, 0.05); },
  step()    { tone(190, 0.03, 'triangle', 0.05, 150); },
  bodyHit() { noiseHit(0.16, 0.3, 900); tone(140, 0.16, 'square', 0.2, 70); },
  headHit() { noiseHit(0.3, 0.4, 1400); tone(420, 0.34, 'sawtooth', 0.24, 70); },
  darkNip() { tone(240, 0.1, 'sine', 0.14, 90); },
  gateOpen(){ tone(523, 0.1, 'square', 0.16); tone(659, 0.1, 'square', 0.16, 0, 0.09); tone(784, 0.1, 'square', 0.16, 0, 0.18); tone(1047, 0.2, 'square', 0.18, 0, 0.27); },
  blocked() { tone(110, 0.13, 'square', 0.18, 95); },
  bell()    { tone(880, 0.14, 'triangle', 0.16); tone(1320, 0.12, 'triangle', 0.1, 0, 0.02); },
  over()    { tone(392, 0.16, 'square', 0.18); tone(330, 0.16, 'square', 0.18, 0, 0.17); tone(262, 0.16, 'square', 0.18, 0, 0.34); tone(196, 0.4, 'square', 0.2, 90, 0.51); },
  pause()   { tone(440, 0.06, 'square', 0.12); tone(330, 0.08, 'square', 0.12, 0, 0.07); },
};

// ============================================================
// SPRITE BAKERY — everything drawn once at load (or at gen for
// gate signs). Per frame we only drawImage these.
// ============================================================
const SPR = {};
let fontEpoch = 0; // bumped when Press Start 2P finishes loading → gate signs rebake

// --- snake ---
function bakeSnake() {
  // body ball
  const seg = makeC(56, 62);
  {
    const g = seg.getContext('2d');
    shadowBlob(g, 28, 50, 17, 8, 0.3);
    const gr = g.createRadialGradient(22, 26, 3, 28, 34, 22);
    gr.addColorStop(0, '#b8f77c');
    gr.addColorStop(0.45, '#5fd35a');
    gr.addColorStop(0.85, '#2f9e44');
    gr.addColorStop(1, '#24803a');
    g.fillStyle = gr;
    g.beginPath(); g.arc(28, 33, 19, 0, Math.PI * 2); g.fill();
    // belly hint
    g.fillStyle = 'rgba(233,255,180,0.32)';
    g.beginPath(); g.ellipse(28, 44, 10, 5, 0, 0, Math.PI * 2); g.fill();
    // spec
    g.fillStyle = 'rgba(255,255,255,0.85)';
    g.beginPath(); g.ellipse(21, 24, 5, 3.4, -0.5, 0, Math.PI * 2); g.fill();
    g.fillStyle = 'rgba(255,255,255,0.4)';
    g.beginPath(); g.ellipse(34, 21, 2.4, 1.6, -0.4, 0, Math.PI * 2); g.fill();
  }
  seg.ax = 28; seg.ay = 50;
  SPR.seg = seg;

  // heads, one per direction — elongated glossy head with eyes on top
  SPR.head = {};
  const dirs = { right: [1, 0], left: [-1, 0], up: [0, 1], down: [0, -1] };
  for (const name in dirs) {
    const d = dirs[name];
    // screen-space forward vector
    let fx = d[0] * AX + d[1] * BX, fy = d[0] * AY + d[1] * BY;
    const fl = Math.hypot(fx, fy); fx /= fl; fy /= fl;
    const ang = Math.atan2(fy, fx);
    const c = makeC(96, 96);
    const g = c.getContext('2d');
    shadowBlob(g, 48, 78, 21, 9, 0.32);
    g.save();
    g.translate(48, 58);
    g.rotate(ang);
    // skull
    let gr = g.createRadialGradient(-4, -9, 3, 0, 0, 27);
    gr.addColorStop(0, '#c2fa86');
    gr.addColorStop(0.45, '#63d75e');
    gr.addColorStop(0.85, '#2f9e44');
    gr.addColorStop(1, '#237a37');
    g.fillStyle = gr;
    g.beginPath(); g.ellipse(0, 0, 22, 17.5, 0, 0, Math.PI * 2); g.fill();
    // snout
    gr = g.createRadialGradient(8, -8, 2, 12, -2, 18);
    gr.addColorStop(0, '#b4f478');
    gr.addColorStop(0.6, '#58cc56');
    gr.addColorStop(1, '#2f9e44');
    g.fillStyle = gr;
    g.beginPath(); g.ellipse(12, 1, 13.5, 12, 0, 0, Math.PI * 2); g.fill();
    // nostrils
    g.fillStyle = 'rgba(20,60,20,0.8)';
    g.beginPath(); g.arc(20, -3.4, 1.5, 0, Math.PI * 2); g.arc(20, 3.4, 1.5, 0, Math.PI * 2); g.fill();
    g.restore();
    // eyes: perched on top, always upright & googly (toy charm)
    const px = -fy, py = fx; // screen perpendicular
    for (const s of [-1, 1]) {
      const ex = 48 + fx * 9 + px * s * 11.5;
      const ey = 58 + fy * 9 + py * s * 11.5 - 11;
      g.fillStyle = 'rgba(20,50,20,0.25)';
      g.beginPath(); g.arc(ex + 1, ey + 2, 7.6, 0, Math.PI * 2); g.fill();
      g.fillStyle = '#fff';
      g.beginPath(); g.arc(ex, ey, 7.6, 0, Math.PI * 2); g.fill();
      g.fillStyle = '#1c2418';
      g.beginPath(); g.arc(ex + fx * 3, ey + fy * 3 - 0.5, 3.8, 0, Math.PI * 2); g.fill();
      g.fillStyle = 'rgba(255,255,255,0.95)';
      g.beginPath(); g.arc(ex + fx * 3 - 1.6, ey + fy * 3 - 2.4, 1.4, 0, Math.PI * 2); g.fill();
    }
    c.ax = 48; c.ay = 78;
    c.tipX = 48 + fx * 33; c.tipY = 58 + fy * 33 - 78; // tongue anchor rel. to ground point
    c.angle = ang;
    SPR.head[name] = c;
  }

  // tongue (drawn rotated at flick time)
  const t = makeC(30, 16);
  {
    const g = t.getContext('2d');
    g.strokeStyle = '#ff4a63'; g.lineWidth = 3; g.lineCap = 'round';
    g.beginPath(); g.moveTo(1, 8); g.lineTo(17, 8); g.stroke();
    g.beginPath(); g.moveTo(17, 8); g.lineTo(27, 3); g.moveTo(17, 8); g.lineTo(27, 13); g.stroke();
  }
  SPR.tongue = t;
}

// --- cars / trucks / bus ---
const CAR_COLORS = ['#ff5350', '#3fa7ff', '#ffc93f', '#b06ef0', '#39d1b4', '#ff8ac2'];
function bakeVehicle(kind, color, dir) {
  const len = kind === 'truck' ? 2.5 : kind === 'bus' ? 2.2 : 1.5;
  const w = Math.ceil(len * AX) + 90, h = 150;
  const c = makeC(w, h);
  const g = c.getContext('2d');
  const cx = w / 2, cy = h - 32;
  // ground-corner origin so the footprint is centered on the anchor
  const x0 = cx - (len / 2) * AX - 0.5 * BX;
  const y0 = cy - (len / 2) * AY - 0.5 * BY;
  shadowBlob(g, cx + 2, cy + 2, len * 31, 13, 0.34);

  const wheel = (fa) => { // fa = fraction along body length, front face side
    const wx = x0 + fa * len * AX + 0.1 * BX;
    const wy = y0 + fa * len * AY + 0.1 * BY;
    g.fillStyle = '#22222a';
    g.beginPath();
    if (g.roundRect) g.roundRect(wx - 7, wy - 13, 14, 14, 4); else g.rect(wx - 7, wy - 13, 14, 14);
    g.fill();
    g.fillStyle = '#54545e';
    g.beginPath(); g.arc(wx, wy - 6, 3.2, 0, Math.PI * 2); g.fill();
  };

  if (kind === 'car') {
    wheel(0.2); wheel(0.8);
    block(g, x0 + 0.03 * AX, y0 - 5, len * 0.94, 0.62, 15, color);
    // cabin: lighter block of the body colour
    const cabA = len * 0.5;
    const cabOff = dir > 0 ? len * 0.2 : len * 0.3;
    const cbx = x0 + cabOff * AX + 0.1 * BX, cby = y0 + cabOff * AY + 0.1 * BY - 20;
    block(g, cbx, cby, cabA, 0.42, 12, color, 1.14);
    // side-window strip on the cabin front face
    g.fillStyle = '#aadcf5';
    poly(g, [[cbx + 4, cby - 10], [cbx + cabA * AX - 4, cby + cabA * AY - 10], [cbx + cabA * AX - 4, cby + cabA * AY - 3], [cbx + 4, cby - 3]]);
    // windshield band across the ROOF near the front edge (reads at this angle)
    const wsOff = dir > 0 ? cabA * 0.72 : 0.02;
    flat(g, cbx + wsOff * AX + 0.04 * BX, cby + wsOff * AY + 0.04 * BY - 12, cabA * 0.26, 0.34, '#bfe9fb');
    // rear window band
    const rwOff = dir > 0 ? 0.02 : cabA * 0.72;
    flat(g, cbx + rwOff * AX + 0.06 * BX, cby + rwOff * AY + 0.06 * BY - 12, cabA * 0.2, 0.3, '#9cc9e4');
    // roof gloss streak
    flat(g, cbx + cabA * 0.34 * AX + 0.08 * BX, cby + cabA * 0.34 * AY + 0.08 * BY - 12, cabA * 0.3, 0.16, 'rgba(255,255,255,0.4)');
  } else if (kind === 'truck') {
    wheel(0.14); wheel(0.62); wheel(0.86);
    // cab
    const cabLen = 0.62, boxLen = len - cabLen - 0.12;
    const cabPos = dir > 0 ? len - cabLen : 0;
    const boxPos = dir > 0 ? 0 : cabLen + 0.12;
    const cbx = x0 + cabPos * AX, cby = y0 + cabPos * AY;
    block(g, cbx, cby - 5, cabLen, 0.6, 24, color);
    g.fillStyle = '#aadcf5';
    poly(g, [[cbx + 5, cby - 27], [cbx + cabLen * AX - 4, cby + cabLen * AY - 27], [cbx + cabLen * AX - 4, cby + cabLen * AY - 17], [cbx + 5, cby - 17]]);
    // cab windshield on roof toward the box
    const cwOff = dir > 0 ? 0.04 : cabLen * 0.6;
    flat(g, cbx + cwOff * AX + 0.08 * BX, cby + cwOff * AY + 0.08 * BY - 29, cabLen * 0.34, 0.4, '#bfe9fb');
    const bx = x0 + boxPos * AX, by = y0 + boxPos * AY;
    block(g, bx, by - 5, boxLen, 0.66, 30, '#ece8df', 0.97);
    g.fillStyle = shade(color, 0.9);
    poly(g, [[bx + 4, by - 22], [bx + boxLen * AX - 4, by + boxLen * AY - 22], [bx + boxLen * AX - 4, by + boxLen * AY - 15], [bx + 4, by - 15]]);
  } else { // bus
    wheel(0.16); wheel(0.84);
    block(g, x0 + 0.02 * AX, y0 - 5, len * 0.96, 0.62, 26, color);
    g.fillStyle = '#aadcf5'; // window strip along the side
    for (let i = 0; i < 5; i++) {
      const fa = 0.1 + i * 0.17;
      const wx = x0 + fa * len * AX, wy = y0 + fa * len * AY;
      g.fillRect(wx, wy - 27, len * AX * 0.11, 9);
    }
    // roof windshield band at the front
    const bwOff = dir > 0 ? 0.86 : 0.02;

// --- score popups (lazy label cache) ---
const labelCache = new Map();
function label(text, color) {
  const key = color + '|' + text;
  let c = labelCache.get(key);
  if (!c) {
    c = makeC(text.length * 14 + 10, 24);
    const g = c.getContext('2d');
    g.font = '12px "Press Start 2P", monospace';

    g.fillStyle = 'rgba(0,0,0,0.65)';
    g.fillText(text, 6, 14);
    g.fillStyle = color;
    g.fillText(text, 5, 12);
    labelCache.set(key, c);
  }
  return c;
}

// ============================================================
// GROUND STRIPS — one long baked parallelogram band per row.
// ============================================================
const stripCache = new Map();

function stripBase() {
  const c = makeC(STRIP_W, STRIP_H);
  return [c, c.getContext('2d')];
}
function tileXY(i) { return [PADX + i * AX, LY0 + i * AY]; }
function oobFade(gx) { // darkness factor beyond the playable corridor
  if (gx >= 0 && gx < COLS) return 1;
  const d = gx < 0 ? -gx : gx - COLS + 1;
  return Math.max(0.32, 1 - d * 0.16);
}
function aoTopBand(g, elev) {
  const [x0, y0] = tileXY(0);
  const [x1, y1] = tileXY(STRIP_N);
  g.fillStyle = 'rgba(0,0,14,0.14)';
  poly(g, [
    [x0 + BX, y0 + BY - elev], [x1 + BX, y1 + BY - elev],
    [x1 + BX, y1 + BY - elev - 6], [x0 + BX, y0 + BY - elev - 6],
  ]);
}
function drawTree(g, x, y, r) {
  shadowBlob(g, x, y + 2, 15, 7, 0.3);
  g.fillStyle = '#6b4426';
  g.fillRect(x - 3.5, y - 12, 7, 12);
  const tiers = [[0, -14, 15, '#2d6b33'], [0, -26, 12, '#357c3b'], [0, -36, 8.5, '#3f8f45']];
  for (const [dx, dy, rr, col] of tiers) {
    g.fillStyle = col;
    g.beginPath(); g.ellipse(x + dx, y + dy, rr, rr * 0.82, 0, 0, Math.PI * 2); g.fill();
  }
  g.fillStyle = 'rgba(255,255,255,0.14)';
  g.beginPath(); g.ellipse(x - 3, y - 38, 4, 2.6, -0.4, 0, Math.PI * 2); g.fill();
}
function paintGrassTiles(g, parity, R) {
  const elev = GRASS_ELEV;
  for (let i = 0; i < STRIP_N; i++) {
    const gx = i + STRIP_GX0;
    const [x, y] = tileXY(i);
    const f = oobFade(gx);
    const even = ((gx + parity) & 1) === 0;
    const base = even ? '#8ade63' : '#7ccf55';
    flat(g, x, y - elev, 1, 1, f === 1 ? base : shade(base, f * 0.62));
    if (f === 1) {
      // tiny decorations
      const r1 = R(), r2 = R();
      if (r1 < 0.3) {
        const tx = x + 12 + r2 * 30, ty = y - elev - 8 - R() * 26;
        g.fillStyle = even ? 'rgba(150,225,110,0.9)' : 'rgba(165,235,120,0.9)';
        g.fillRect(tx, ty, 2, 5); g.fillRect(tx + 4, ty - 2, 2, 6); g.fillRect(tx + 8, ty + 1, 2, 4);
      } else if (r1 < 0.42) {
        const tx = x + 14 + r2 * 28, ty = y - elev - 10 - R() * 24;
        g.fillStyle = R() < 0.5 ? '#ffffff' : '#ffd9ec';
        g.fillRect(tx - 2, ty, 6, 2); g.fillRect(tx, ty - 2, 2, 6);
        g.fillStyle = '#ffd23f'; g.fillRect(tx, ty, 2, 2);
      }
    } else if (R() < 0.62) {
      drawTree(g, x + 16 + R() * 26, y - elev - 12 - R() * 22, R);
    }
  }
  // dirt skirt along the front edge
  const [fx0, fy0] = tileXY(0);
  const [fx1, fy1] = tileXY(STRIP_N);
  g.fillStyle = '#9c6a3e';
  poly(g, [[fx0, fy0 - elev], [fx1, fy1 - elev], [fx1, fy1 + 13], [fx0, fy0 + 13]]);
  g.fillStyle = '#7a4f2b';
  poly(g, [[fx0, fy0 + 13], [fx1, fy1 + 13], [fx1, fy1 + 22], [fx0, fy0 + 22]]);
  aoTopBand(g, elev);
}
function bakeGrassStrip(parity, variant) {
  const [c, g] = stripBase();
  const R = mulberry32(9000 + parity * 131 + variant * 977);
  paintGrassTiles(g, parity, R);
  return c;
}
function bakeRoadStrip(edgeTop, edgeBot, dashTop, variant) {
  const [c, g] = stripBase();
  const R = mulberry32(5000 + variant * 613 + (edgeTop ? 7 : 0) + (edgeBot ? 13 : 0) + (dashTop ? 29 : 0));
  for (let i = 0; i < STRIP_N; i++) {
    const gx = i + STRIP_GX0;
    const [x, y] = tileXY(i);
    const f = oobFade(gx) * 0.92 + 0.08;
    flat(g, x, y, 1, 1, shade('#4b4b56', f));
    // asphalt wear
    if (R() < 0.4) {
      g.fillStyle = 'rgba(255,255,255,0.045)';
      g.fillRect(x + 8 + R() * 30, y - 12 - R() * 22, 10 + R() * 14, 4);
    }
    if (R() < 0.18) {
      g.fillStyle = 'rgba(0,0,0,0.2)';
      g.fillRect(x + 10 + R() * 28, y - 10 - R() * 24, 2, 7 + R() * 6);
    }
  }
  const lineAt = (bFrac, colFn, dashed) => {
    for (let i = 0; i < STRIP_N; i++) {
      const gx = i + STRIP_GX0;
      const [x, y] = tileXY(i);
      const f = oobFade(gx) * 0.92 + 0.08;
      g.fillStyle = colFn(f);
      const bx = bFrac * BX, by = bFrac * BY;
      if (dashed) {
        poly(g, [[x + bx + 14, y + by - 3], [x + bx + 40, y + by - 3 + (AY * 26 / AX)],

      } else {
        poly(g, [[x + bx, y + by - 2], [x + AX + bx, y + AY + by - 2], [x + AX + bx, y + AY + by + 2], [x + bx, y + by + 2]]);
      }
    }
  };
  if (edgeBot) lineAt(0.09, f => `rgba(232,228,208,${0.85 * f})`, false);
  if (edgeTop) lineAt(0.91, f => `rgba(232,228,208,${0.85 * f})`, false);
  if (dashTop && !edgeTop) lineAt(0.97, f => `rgba(226,219,190,${0.8 * f})`, true);
  // skirt
  const [fx0, fy0] = tileXY(0);
  const [fx1, fy1] = tileXY(STRIP_N);
  g.fillStyle = '#2c2c35';
  poly(g, [[fx0, fy0], [fx1, fy1], [fx1, fy1 + 20], [fx0, fy0 + 20]]);
  aoTopBand(g, 0);
  return c;
}
function bakeRailStrip(variant) {
  const [c, g] = stripBase();
  const R = mulberry32(3000 + variant * 421);
  for (let i = 0; i < STRIP_N; i++) {
    const gx = i + STRIP_GX0;
    const [x, y] = tileXY(i);
    const f = oobFade(gx) * 0.92 + 0.08;
    flat(g, x, y, 1, 1, shade('#847a68', f));
    for (let k = 0; k < 10; k++) { // gravel speckles
      g.fillStyle = R() < 0.5 ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.1)';
      g.fillRect(x + R() * 52, y - R() * 40 - 2, 3, 2);
    }
    // ties
    for (const fa of [0.18, 0.68]) {
      const tx = x + fa * AX, ty = y + fa * AY;
      g.fillStyle = shade('#5c452c', f);
      poly(g, [[tx + 0.14 * BX, ty + 0.14 * BY], [tx + 12 + 0.14 * BX, ty + 12 * (AY / AX) + 0.14 * BY],
               [tx + 12 + 0.86 * BX, ty + 12 * (AY / AX) + 0.86 * BY], [tx + 0.86 * BX, ty + 0.86 * BY]]);
    }

    g.fillStyle = '#c9ccd4';
    poly(g, [[p0[0] + bx, p0[1] + by - 2], [p1[0] + bx, p1[1] + by - 2], [p1[0] + bx, p1[1] + by + 1], [p0[0] + bx, p0[1] + by + 1]]);
  }
  const [fx0, fy0] = tileXY(0);
  const [fx1, fy1] = tileXY(STRIP_N);
  g.fillStyle = '#54503f';
  poly(g, [[fx0, fy0], [fx1, fy1], [fx1, fy1 + 20], [fx0, fy0 + 20]]);

function bakeGateStrip(parity, req, open, variant) {

               [x1 + 0.42 * BX, y1 + 0.42 * BY - elev - bh + 7], [x0 + 0.42 * BX, y0 + 0.42 * BY - elev - bh + 7]]);

// WORLD
// ============================================================
const rows = new Map();
let genFront = 0;          // next gy to generate
let lastBandType = 'grass';
let roadBandsSinceGate = 0;
let gateIdx = 0;
let snacksSpawned = 0;

function diffAt(gy) { return clamp(gy / 75, 0, 1); }

function newRow(gy, type, extra) {
  const row = Object.assign({
    gy, type,
    elev: (type === 'grass' || type === 'gate') ? GRASS_ELEV : 0,
    parity: gy & 1,
    variant: (gy * 7) % 3,
    snacks: [],
    ents: [],
    cars: null, lane: null, rail: null, gate: null,
  }, extra || {});
  if (type === 'grass') row.key = 'g' + row.parity + row.variant;
  else if (type === 'road') row.key = 'r' + (row.edgeTop ? 1 : 0) + (row.edgeBot ? 1 : 0) + (row.dashTop ? 1 : 0) + row.variant;
  else if (type === 'rail') row.key = 'x' + row.variant;
  rows.set(gy, row);
  return row;
}
function addSnackTo(row, gx, kind) {
  row.snacks.push({ gx, kind, phase: rng() * 6.28 });
  snacksSpawned++;
}
function sprinkleSnacks(row, prob) {
  for (let gx = 1; gx < COLS - 1; gx++) {
    if (rng() < prob) {
      const r = rng();
      addSnackTo(row, gx, r < 0.55 ? 'berry' : r < 0.8 ? 'egg' : 'mouse');
    }
  }
}
function makeLane(row) {
  const d = diffAt(row.gy);
  const dir = rng() < 0.5 ? 1 : -1;
  const speed = (1.35 + rng() * 1.15) * (1 + d * 1.15);
  const gap = Math.max(2.1, 3.8 - d * 1.5 + rng() * 2.2);
  row.lane = { dir, speed, gap };
  row.cars = [];
  const designs = SPR.veh[String(dir)];
  let x = -6 + rng() * 2;
  while (x < 21) {
    const truckOk = rng() < (0.18 + d * 0.15);
    let di = truckOk ? 6 + ((rng() * 3) | 0) : (rng() * 6) | 0;
    if (di >= designs.length) di = designs.length - 1;
    const dsg = designs[di];
    row.cars.push({ x: x + dsg.hl, hl: dsg.hl, cv: dsg.cv, phase: rng() * 6.28, hitT: 0 });
    x += dsg.hl * 2 + gap * (0.75 + rng() * 0.6);
  }
}
function genBand() {
  const gy0 = genFront;
  if (lastBandType === 'grass' || lastBandType === 'gate') {
    // road or rail
    const d = diffAt(gy0);
    if (gy0 > 22 && rng() < 0.14) {
      const row = newRow(gy0, 'rail');
      row.rail = { phase: 'idle', t: 2.5 + rng() * 5, dir: rng() < 0.5 ? 1 : -1, trainX: 0, bellT: 0 };
      genFront += 1;
      lastBandType = 'road';
    } else {
      const maxLanes = 1 + Math.min(3, Math.floor(d * 4.4 + rng() * 1.4));
      const lanes = 1 + ((rng() * maxLanes) | 0);
      for (let i = 0; i < lanes; i++) {
        const row = newRow(gy0 + i, 'road', {
          edgeBot: i === 0, edgeTop: i === lanes - 1, dashTop: i < lanes - 1,
        });
        makeLane(row);
        sprinkleSnacks(row, 0.06);
      }
      genFront += lanes;
      lastBandType = 'road';
      roadBandsSinceGate++;
    }
  } else {
    // grass band. Min-length gates removed (owner call: too hard for the
    // kids) — gateDue stays permanently false, which leaves all gate
    // machinery dormant; length still pays through the per-row multiplier.
    const gateDue = false;
    let n = 1 + ((rng() * 2.2) | 0);
    if (gateDue) n = Math.max(2, n);
    for (let i = 0; i < n; i++) {
      if (gateDue && i === 1) {
        // requirement scales but stays achievable vs. snacks seen so far
        let req = 4 + gateIdx + ((gateIdx / 2) | 0);
        req = Math.min(req, 3 + Math.floor(snacksSpawned * 0.5), 14);
        req = Math.max(4, req);
        const row = newRow(genFront + i, 'gate');
        row.gate = { req, open: false, cv: null, baked: '', claimed: false };
        gateIdx++;
        roadBandsSinceGate = 0;
      } else {
        const row = newRow(genFront + i, 'grass');
        if (genFront + i > 3) sprinkleSnacks(row, 0.035);
      }
    }
    genFront += n;
    lastBandType = 'grass';
  }
}
function genUpTo(gy) {
  let guard = 0;
  while (genFront <= gy && guard++ < 200) genBand();
}
function pruneRows(below) {
  for (const key of rows.keys()) if (key < below) rows.delete(key);
}

let state = 'title'; // title | playing | over
let paused = false;
let time = 0;
let cam = -2.2, camX = 0;
let score = 0, best = 0;
let shakeT = 0;
let overCooldown = 0;
let mercyT = 0;
let darkT = 0;
let bumpT = 0, bumpDX = 0, bumpDY = 0;
let blockBuzzT = 0;
let overReason = '';

try { best = parseInt(localStorage.getItem(BEST_KEY), 10) || 0; } catch (e) { best = 0; }

const snake = {
  len: START_LEN,
  pathX: [], pathY: [],
  moving: false, t: 0,
  dirX: 0, dirY: 1, dirName: 'up',
  invuln: 0, bodyCd: 0,
  safeX: 6, safeY: 1,
  maxRow: 1,
};
// per-frame segment positions (grid space) — preallocated
const segFX = new Float64Array(MAXSEG);
const segFY = new Float64Array(MAXSEG);

function resetWorld() {
  rows.clear(); stripEnts.length = 0;
  genFront = 0; lastBandType = 'road'; roadBandsSinceGate = 0; gateIdx = 0; snacksSpawned = 0;
  if (!SEED_PARAM) rng = mulberry32((Date.now() * 48271) >>> 4);
  // starting meadow (a few rows behind the start line too, for the camera)
  for (let i = -6; i < 4; i++) newRow(i, 'grass');
  lastBandType = 'grass';
  genUpTo(24);
  cam = -2.2; camX = 0;
  score = 0;
  mercyT = 0; darkT = 0; shakeT = 0; bumpT = 0;
  snake.len = START_LEN;
  snake.pathX.length = 0; snake.pathY.length = 0;
  snake.pathX.push(6, 6, 6); snake.pathY.push(-1, 0, 1);
  snake.moving = false; snake.t = 0;
  snake.dirX = 0; snake.dirY = 1; snake.dirName = 'up';
  snake.invuln = 0; snake.bodyCd = 0;
  snake.safeX = 6; snake.safeY = 1;
  snake.maxRow = 1;
  for (const p of particles) p.life = 0;
  for (const p of popups) p.life = 0;
  hudDirty = true;
}
const stripEnts = []; // spillover ents when a row is missing

// ---------- snake body sampling ----------
function headArc() {
  return (snake.pathX.length - 1) - (snake.moving ? (1 - snake.t) : 0);
}
const ptOut = { x: 0, y: 0 };
function pathPoint(arc, out) {
  const L = snake.pathX.length;
  if (arc <= 0) { out.x = snake.pathX[0]; out.y = snake.pathY[0]; return; }
  if (arc >= L - 1) { out.x = snake.pathX[L - 1]; out.y = snake.pathY[L - 1]; return; }
  const i = arc | 0, f = arc - i;
  out.x = snake.pathX[i] + (snake.pathX[i + 1] - snake.pathX[i]) * f;
  out.y = snake.pathY[i] + (snake.pathY[i + 1] - snake.pathY[i]) * f;
}
function computeSegs() {
  const ha = headArc();
  const n = Math.min(snake.len, MAXSEG);
  for (let i = 0; i < n; i++) {
    pathPoint(ha - i * SPACING, ptOut);
    segFX[i] = ptOut.x; segFY[i] = ptOut.y;
  }
  return n;
}
function trimPath() {
  const keep = Math.ceil(snake.len * SPACING) + 4;
  const excess = snake.pathX.length - keep;
  if (excess > 0) { snake.pathX.splice(0, excess); snake.pathY.splice(0, excess); }
}

// ---------- movement ----------
function canEnter(gx, gy) {
  if (gx < 0 || gx >= COLS || gy < 0) return false;
  const row = rows.get(gy);
  if (row && row.type === 'gate' && !row.gate.open) return 'gate';
  return true;
}
function headCellX() { return snake.pathX[snake.pathX.length - 1]; }
function headCellY() { return snake.pathY[snake.pathY.length - 1]; }

function tryStartMove(dx, dy, name) {
  const tx = headCellX() + dx, ty = headCellY() + dy;
  const v = canEnter(tx, ty);
  if (v === true) {
    snake.pathX.push(tx); snake.pathY.push(ty);
    snake.moving = true;
    snake.dirX = dx; snake.dirY = dy; snake.dirName = name;
    return true;
  }
  if (v === 'gate' && blockBuzzT <= 0) {
    blockBuzzT = 0.55;
    bumpT = 0.2; bumpDX = dx; bumpDY = dy;
    sfx.blocked();
  }
  return false;
}
let stepParity = 0;
function arriveEvents() {
  const gx = headCellX(), gy = headCellY();
  const row = rows.get(gy);
  if (row) {
    // snacks
    for (let i = 0; i < row.snacks.length; i++) {
      if (row.snacks[i].gx === gx) {
        const kind = row.snacks[i].kind;
        row.snacks.splice(i, 1);
        snake.len = Math.min(snake.len + 1, MAXSEG);
        const pts = SNACK_INFO[kind].pts;
        score += pts;
        spawnPopup(gx, gy, '+' + pts, '#ffe66e');
        burst(gx, gy, SPR.spark, 5, 1.4);
        burst(gx, gy, SPR.puffG, 3, 1);
        sfx.eat();
        hudDirty = true;
        break;
      }
    }
    if (row.type === 'grass' || (row.type === 'gate' && row.gate.open)) {
      snake.safeX = gx; snake.safeY = gy;
    }
    if (row.type === 'gate' && row.gate.open && !row.gate.claimed) {
      row.gate.claimed = true;
      const bonus = row.gate.req * 20;
      score += bonus;
      spawnPopup(gx, gy, 'GATE +' + bonus, '#a7f25f');
      hudDirty = true;
    }
  }
  if (gy > snake.maxRow) {
    score += 5 * snake.len * (gy - snake.maxRow);
    snake.maxRow = gy;
    hudDirty = true;
  }

}
function updateSnakeMove(dirName, dt) {
  const vecs = { up: [0, 1], down: [0, -1], left: [-1, 0], right: [1, 0] };
  if (!snake.moving && dirName) {
    const v = vecs[dirName];
    tryStartMove(v[0], v[1], dirName);
  }
  if (snake.moving) {
    snake.t += dt / MOVE_DUR;
    let guard = 0;
    while (snake.moving && snake.t >= 1 && guard++ < 8) {
      const leftover = snake.t - 1;
      snake.t = 0; snake.moving = false;
      arriveEvents();
      if (state !== 'playing') return;
      if (dirName) {
        const v = vecs[dirName];
        if (tryStartMove(v[0], v[1], dirName)) snake.t = leftover;
      }
    }
  }
}

// ---------- damage ----------
function findRespawn() {
  let gx = clamp(snake.safeX, 0, COLS - 1);
  let start = Math.max(snake.safeY, Math.ceil(cam) + 1);
  for (let gy = start; gy < start + 30; gy++) {
    const row = rows.get(gy);
    if (!row) continue;
    if (row.type === 'grass' || (row.type === 'gate' && row.gate.open)) return [gx, gy];
    if (row.type === 'gate' && !row.gate.open) break; // never skip past a locked gate
  }
  // fallback: scan down from safeY
  for (let gy = start; gy >= Math.max(0, Math.ceil(cam)); gy--) {
    const row = rows.get(gy);
    if (row && (row.type === 'grass' || (row.type === 'gate' && row.gate.open))) return [gx, gy];
  }
  return [gx, Math.max(0, start)];
}
function bodyHit(i, isTrain) {

  burst(segFX[i], segFY[i], SPR.puffW, 5, 1.3);
  spawnPopup(segFX[i], segFY[i], '-1', '#ff8a7a');
  sfx.bodyHit();
  hudDirty = true;
  return true;
}
function headHit() {
  if (snake.invuln > 0) return;
  snake.len -= 2;
  sfx.headHit();
  shakeT = 0.4;
  burst(segFX[0], segFY[0], SPR.puffW, 8, 1.8);
  if (snake.len < 1) { gameOver('RUN OVER'); return; }
  const [rx, ry] = findRespawn();
  snake.pathX.length = 0; snake.pathY.length = 0;
  snake.pathX.push(rx, rx); snake.pathY.push(ry, ry);
  snake.moving = false; snake.t = 0;
  snake.invuln = 1.5;

  hudDirty = true;
}
function gameOver(reason) {

  overReason = reason;
  overCooldown = 0.7;
  if (score > best) {
    best = score;
    try { localStorage.setItem(BEST_KEY, String(best)); } catch (e) {}
    document.getElementById('overStats').innerHTML =
      'SCORE ' + score + '<br><span class="newbest">NEW BEST!</span>';
  } else {
    document.getElementById('overStats').innerHTML =
      'SCORE ' + score + '<br><span class="best">BEST ' + best + '</span>';
  }

  document.getElementById('over').classList.remove('hidden');
  document.getElementById('hud').classList.add('hidden');
  sfx.over();
}

// ---------- traffic / trains ----------
function updateTraffic(dt) {
  const lo = cam - 2, hi = cam + 20;
  for (const row of rows.values()) {
    if (!row.cars || row.gy < lo || row.gy > hi) continue;
    const lane = row.lane, cars = row.cars;
    const d = lane.dir, sp = lane.speed;
    for (let i = 0; i < cars.length; i++) {
      const car = cars[i];
      car.x += d * sp * dt;
      if (car.hitT > 0) car.hitT -= dt;
      if ((d > 0 && car.x - car.hl > 21) || (d < 0 && car.x + car.hl < -8)) {
        // recycle behind the rearmost car of the stream
        let edge = d > 0 ? 99 : -99;
        for (let j = 0; j < cars.length; j++) {
          if (j === i) continue;
          if (d > 0) edge = Math.min(edge, cars[j].x - cars[j].hl);
          else edge = Math.max(edge, cars[j].x + cars[j].hl);
        }
        const gap = lane.gap * (0.75 + rng() * 0.6);
        if (d > 0) car.x = Math.min(-8, edge - gap) - car.hl;
        else car.x = Math.max(21, edge + gap) + car.hl;
      }
    }
  }
}
function updateRails(dt, live) {
  const lo = cam - 2, hi = cam + 19;
  for (const row of rows.values()) {
    if (!row.rail || row.gy < lo || row.gy > hi) continue;
    const r = row.rail;
    r.t -= dt;
    if (r.phase === 'idle' && r.t <= 0) {
      r.phase = 'warn'; r.t = 1.5; r.bellT = 0;
      if (live) sfx.bell();
    } else if (r.phase === 'warn') {
      r.bellT -= dt;
      if (r.bellT <= 0) { r.bellT = 0.45; if (live && row.gy > cam && row.gy < cam + 17) sfx.bell(); }
      if (r.t <= 0) {
        r.phase = 'train'; r.trainX = r.dir > 0 ? -14 : 27;
        r.t = 99;
      }
    } else if (r.phase === 'train') {
      r.trainX += r.dir * 17 * dt;
      if ((r.dir > 0 && r.trainX - 11 > 22) || (r.dir < 0 && r.trainX + 11 < -9)) {
        r.phase = 'idle'; r.t = 4 + rng() * 6;
      }
    }
  }
}

// ---------- collisions ----------
function collide(segCount) {
  if (snake.invuln > 0) return;
  const lo = cam - 1, hi = cam + 18;
  for (const row of rows.values()) {
    if (row.gy < lo || row.gy > hi) continue;
    if (row.cars) {
      for (let c = 0; c < row.cars.length; c++) {
        const car = row.cars[c];
        if (car.hitT > 0) continue; // a car chews one segment per pass
        for (let i = 0; i < segCount && i < snake.len; i++) {
          if (Math.abs(segFY[i] - row.gy) < 0.38 && Math.abs(segFX[i] - car.x) < car.hl + 0.3) {
            if (i === 0) { car.hitT = 1.2; headHit(); if (state !== 'playing') return; }
            else if (bodyHit(i, false)) car.hitT = 1.2;
            break;
          }
        }
        if (snake.invuln > 0 || state !== 'playing') return;
      }
    }
    if (row.rail && row.rail.phase === 'train') {
      const r = row.rail;
      const c0 = r.trainX - r.dir * 10, c1 = r.trainX;
      const lo2 = Math.min(c0, c1) - 1, hi2 = Math.max(c0, c1) + 1;
      for (let i = 0; i < segCount && i < snake.len; i++) {
        if (Math.abs(segFY[i] - row.gy) < 0.38 && segFX[i] > lo2 && segFX[i] < hi2) {
          if (i === 0) { headHit(); if (state !== 'playing') return; }
          else bodyHit(i, true);
          break;
        }
      }
      if (snake.invuln > 0 || state !== 'playing') return;
    }
  }
}

// ---------- the dark ----------
function darkEat(dt, segCount) {
  darkT -= dt;
  const bottom = cam + 0.15;
  if (segFY[0] < cam - 0.3) { gameOver('THE DARK GOT YOU'); return; }
  if (snake.len > 1 && darkT <= 0) {
    const tail = Math.min(snake.len, segCount) - 1;
    if (segFY[tail] < bottom) {
      snake.len--;
      darkT = 0.35;
      burst(segFX[tail], segFY[tail], SPR.puffD, 4, 1.2);
      sfx.darkNip();
      hudDirty = true;
    }
  }
}

// ---------- camera ----------
function updateCamera(dt) {
  const headFY = segFY[0];
  let sp = 0.3 + Math.min(0.55, snake.maxRow * 0.0055);
  const rel = headFY - cam;
  if (rel < 3.4) sp *= 0.22;   // mercy: don't chase a kid pinned at the bottom
  cam += sp * dt;
  if (rel > 7.4) cam += (headFY - 7.4 - cam) * Math.min(1, dt * 2.5);
}

// ---------- gates ----------
function updateGates() {
  const hi = cam + 18;
  for (const row of rows.values()) {
    if (!row.gate || row.gate.open || row.gy > hi || row.gy < cam) continue;
    if (snake.len >= row.gate.req) {
      row.gate.open = true;
      sfx.gateOpen();
      for (let gx = 1; gx < COLS; gx += 2) burst(gx, row.gy, SPR.puffG, 2, 1.4);
      spawnPopup(6, row.gy, 'GATE OPEN!', '#a7f25f');
    }
  }
}
function nearestLockedGateAbove(gy, maxDist) {
  for (let g = gy + 1; g <= gy + maxDist; g++) {

    if (row && row.type === 'gate' && !row.gate.open) return g;
  }
  return -1;
}
function updateMercy(dt) {
  const gGy = nearestLockedGateAbove(headCellY(), 4);
  if (gGy < 0) { mercyT = 0; return; }
  // any snack left between the camera edge and the gate?
  let found = false;
  for (const row of rows.values()) {
    if (row.gy >= Math.ceil(cam) && row.gy < gGy && row.snacks.length > 0) { found = true; break; }
  }
  if (found) { mercyT = 0; return; }
  mercyT += dt;
  if (mercyT > 2.5) {
    mercyT = 0;
    const lo = Math.max(Math.ceil(cam) + 1, headCellY() - 3);
    for (let tries = 0; tries < 12; tries++) {
      const gy = lo + ((rng() * Math.max(1, gGy - lo)) | 0);
      const row = rows.get(gy);
      if (row && row.type !== 'gate') {
        const gx = 1 + ((rng() * (COLS - 2)) | 0);
        addSnackTo(row, gx, 'mouse');
        burst(gx, gy, SPR.puffW, 3, 1);
        break;
      }
    }
  }
}

// ---------- particles / popups (pooled) ----------
const particles = [];
for (let i = 0; i < 90; i++) particles.push({ life: 0, x: 0, y: 0, vx: 0, vy: 0, max: 1, spr: null, sc: 1 });
let partIdx = 0;
function burst(fx, fy, spr, n, power) {
  const sx = sxOf(fx + 0.5, fy + 0.5);

  for (let i = 0; i < n; i++) {
    const p = particles[partIdx]; partIdx = (partIdx + 1) % particles.length;
    const a = rng() * 6.28, v = (30 + rng() * 70) * power;
    p.life = p.max = 0.4 + rng() * 0.35;
    p.x = sx + (rng() - 0.5) * 18; p.y = sy + (rng() - 0.5) * 12;
    p.vx = Math.cos(a) * v; p.vy = Math.sin(a) * v * 0.6 - 40 * power;
    p.spr = spr; p.sc = 0.6 + rng() * 0.7;
  }
}
const popups = [];
for (let i = 0; i < 14; i++) popups.push({ life: 0, x: 0, y: 0, cv: null });
let popIdx = 0;
function spawnPopup(fx, fy, text, color) {
  const p = popups[popIdx]; popIdx = (popIdx + 1) % popups.length;
  p.life = 1;
  p.x = sxOf(fx + 0.5, fy + 0.5);
  p.y = syOf(fx + 0.5, fy + 0.5) - elevAt(fy) - 46;
  p.cv = label(text, color);
}
function updateParticles(dt) {
  for (const p of particles) {
    if (p.life <= 0) continue;
    p.life -= dt;
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 140 * dt;
  }
  for (const p of popups) {
    if (p.life <= 0) continue;
    p.life -= dt * 1.15;
    p.y -= 32 * dt;
  }
}

// ============================================================
// INPUT
// ============================================================
const keysHeld = new Set();
const keyOrder = [];
const KEYMAP = {
  ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
  KeyW: 'up', KeyS: 'down', KeyA: 'left', KeyD: 'right',
};
let touchDir = null, touchAX = 0, touchAY = 0, touchOn = false;
let forceDir = null; // test hook

function padHeldDir() {
  if (!window.ArcadeController) return null;
  const p = window.ArcadeController.pad(0);
  if (!p.connected) return null;
  let ax = (p.button('right') ? 1 : 0) - (p.button('left') ? 1 : 0);
  let ay = (p.button('down') ? 1 : 0) - (p.button('up') ? 1 : 0);
  if (ax === 0 && ay === 0) { ax = p.axis('lx'); ay = p.axis('ly'); }
  if (Math.abs(ax) < 0.4 && Math.abs(ay) < 0.4) return null;
  if (Math.abs(ax) >= Math.abs(ay)) return ax > 0 ? 'right' : 'left';
  return ay > 0 ? 'down' : 'up';
}
function kbdHeldDir() {
  for (let i = keyOrder.length - 1; i >= 0; i--) {
    if (keysHeld.has(keyOrder[i])) return KEYMAP[keyOrder[i]];
  }
  return null;
}
function readHeldDir() {
  if (forceDir) return forceDir;
  return padHeldDir() || (touchOn ? touchDir : null) || kbdHeldDir();
}

function doConfirm() {
  audioInit();
  if (state === 'title') startRun();
  else if (state === 'over' && overCooldown <= 0) startRun();
}
function startRun() {
  resetWorld();
  state = 'playing';
  paused = false;
  document.getElementById('title').classList.add('hidden');
  document.getElementById('over').classList.add('hidden');
  document.getElementById('paused').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  sfx.start();
}
function togglePause() {
  if (state !== 'playing') return;
  paused = !paused;
  document.getElementById('paused').classList.toggle('hidden', !paused);
  sfx.pause();
}

// Gamepad button edges come from the controller library's own event stream —
// never polled from the game loop, so no edge is lost to frame pacing.
// START pauses (pad 0, in-match); ANY pad drives menus with south/start.
if (window.ArcadeController) {
  window.ArcadeController.on('press', (e) => {
    if (e.button !== 'start' && e.button !== 'south') return;
    audioInit();
    if (state === 'playing') {
      if (paused) {
        if (e.button === 'start' || e.button === 'south') togglePause();
      } else if (e.button === 'start' && e.padIndex === 0) {
        togglePause();
      }
    } else {
      doConfirm();
    }
  });
}

window.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  audioInit();
  if (KEYMAP[e.code]) {
    keysHeld.add(e.code);
    const idx = keyOrder.indexOf(e.code);
    if (idx >= 0) keyOrder.splice(idx, 1);
    keyOrder.push(e.code);
    e.preventDefault();
  } else if (e.code === 'KeyP') {
    togglePause();
  } else if (e.code === 'Enter' || e.code === 'Space') {
    if (state === 'playing' && paused) togglePause();
    else doConfirm();
    e.preventDefault();
  }
});
window.addEventListener('keyup', (e) => {
  keysHeld.delete(e.code);
});
window.addEventListener('blur', () => { keysHeld.clear(); touchOn = false; touchDir = null; });

// touch: hold-drag anywhere = direction; tap = menu confirm
const stage = document.getElementById('stage');
stage.addEventListener('touchstart', (e) => {
  audioInit();
  const t = e.changedTouches[0];
  touchAX = t.clientX; touchAY = t.clientY;
  touchOn = true; touchDir = null;
  if (state !== 'playing') doConfirm();
  else if (paused) togglePause();
  e.preventDefault();
}, { passive: false });
stage.addEventListener('touchmove', (e) => {
  if (!touchOn) return;
  const t = e.changedTouches[0];
  let dx = t.clientX - touchAX, dy = t.clientY - touchAY;
  const d = Math.hypot(dx, dy);
  if (d > 22) {
    touchDir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up');
    // anchor trails the finger so direction changes feel immediate
    if (d > 46) {
      const k = (d - 46) / d;
      touchAX += dx * k; touchAY += dy * k;
    }
  }
  e.preventDefault();
}, { passive: false });
const touchEnd = (e) => { touchOn = false; touchDir = null; if (e.cancelable) e.preventDefault(); };
stage.addEventListener('touchend', touchEnd, { passive: false });
stage.addEventListener('touchcancel', touchEnd, { passive: false });
stage.addEventListener('mousedown', () => { audioInit(); if (state !== 'playing') doConfirm(); });

// ============================================================
// RENDER
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let blitCount = 0, lastBlits = 0, lastEnts = 0;

function sxOf(gx, gy) { return OX + gx * AX + (gy - cam) * BX + camX; }
function syOf(gx, gy) { return OY + gx * AY + (gy - cam) * BY; }
function elevRow(gy) {
  const row = rows.get(Math.round(gy));
  return row ? row.elev : 0;
}
function elevAt(fy) {
  const g0 = Math.floor(fy), f = fy - g0;
  const r0 = rows.get(g0), r1 = rows.get(g0 + 1);
  const e0 = r0 ? r0.elev : 0, e1 = r1 ? r1.elev : 0;
  return e0 + (e1 - e0) * f;
}

// pooled ent records
const ENT_POOL = [];
for (let i = 0; i < 200; i++) ENT_POOL.push({ fx: 0, img: null, x: 0, y: 0, sc: 1, rot: 0 });
let entIdx = 0;
function entRec(bucketRow, fx, img, x, y, sc, rot) {
  if (entIdx >= ENT_POOL.length) return;
  const r = ENT_POOL[entIdx++];
  r.fx = fx; r.img = img; r.x = x; r.y = y; r.sc = sc || 1; r.rot = rot || 0;
  if (bucketRow) bucketRow.ents.push(r);
  else stripEnts.push(r);
}
const entCmp = (a, b) => b.fx - a.fx;

function blit(img, x, y) { blitCount++; ctx.drawImage(img, x, y); }
function blitRec(r) {
  blitCount++;
  if (r.rot === 0 && r.sc === 1) {
    ctx.drawImage(r.img, r.x - r.img.ax, r.y - r.img.ay);
  } else if (r.rot === 0) {
    ctx.drawImage(r.img, r.x - r.img.ax * r.sc, r.y - r.img.ay * r.sc, r.img.width * r.sc, r.img.height * r.sc);
  } else {
    ctx.setTransform(1, 0, 0, 1, r.x, r.y);
    ctx.rotate(r.rot);
    ctx.drawImage(r.img, -r.img.width / 2, -r.img.height / 2, r.img.width * r.sc, r.img.height * r.sc);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }
}

function render() {
  blitCount = 0;
  entIdx = 0;
  stripEnts.length = 0;

  let shX = 0, shY = 0;
  if (shakeT > 0) {
    shX = (Math.sin(time * 71) * 7 + Math.sin(time * 113) * 4) * shakeT;
    shY = (Math.cos(time * 87) * 5) * shakeT;
  }
  ctx.setTransform(1, 0, 0, 1, shX, shY);

  ctx.fillStyle = '#14121f';
  ctx.fillRect(-12, -12, W + 24, H + 24);

  const rLo = Math.floor(cam) - 1, rHi = Math.floor(cam) + 17;

  // clear buckets
  for (let r = rLo; r <= rHi; r++) {
    const row = rows.get(r);
    if (row) row.ents.length = 0;
  }

  // ---- populate entity buckets ----
  const segCount = Math.min(snake.len, MAXSEG);
  const drawSnake = !(state === 'over') && !(snake.invuln > 0 && ((time * 10) | 0) % 2 === 0);

  for (let r = rLo; r <= rHi; r++) {
    const row = rows.get(r);
    if (!row) continue;
    // snacks
    for (let i = 0; i < row.snacks.length; i++) {
      const s = row.snacks[i];
      const bob = Math.sin(time * 3 + s.phase) * 2;
      entRec(row, s.gx,
        SPR.snack[s.kind],
        sxOf(s.gx + 0.5, r + 0.5),
        syOf(s.gx + 0.5, r + 0.5) - row.elev + bob, 1, 0);
    }
    // cars
    if (row.cars) {
      for (let i = 0; i < row.cars.length; i++) {
        const car = row.cars[i];
        const x = sxOf(car.x, r + 0.5);
        if (x < -180 || x > W + 180) continue;
        const bob = Math.sin(time * 6 + car.phase) * 1.2;
        entRec(row, car.x, car.cv, x, syOf(car.x, r + 0.5) + bob, 1, 0);
      }
    }
    // rail furniture + train
    if (row.rail) {
      const rl = row.rail;
      let frame = 0;
      if (rl.phase === 'warn' || rl.phase === 'train') frame = 1 + (((time * 4) | 0) % 2);
      entRec(row, 12.85, SPR.signal[frame], sxOf(12.85, r + 0.45), syOf(12.85, r + 0.45), 1, 0);
      if (rl.phase === 'train') {
        const set = SPR.train[String(rl.dir)];
        for (let k = 0; k < 5; k++) {
          const cx = rl.trainX - rl.dir * (1 + k * 2.05);
          const x = sxOf(cx, r + 0.5);
          if (x < -220 || x > W + 220) continue;
          entRec(row, cx, k === 0 ? set.loco : set.wagon, x, syOf(cx, r + 0.5), 1, 0);
        }
      }
    }
  }

  // snake (tail pushed first so the head wins ties)
  if (state !== 'title' && drawSnake) {
    for (let i = segCount - 1; i >= 1; i--) {
      const fx = segFX[i], fy = segFY[i];
      const row = rows.get(clamp(Math.round(fy), rLo, rHi));
      const breathe = 1 + 0.035 * Math.sin(time * 2.3 + i * 0.55);
      const taper = Math.max(0.72, 1 - (i / Math.max(7, snake.len)) * 0.3);
      entRec(row, fx,
        SPR.seg,
        sxOf(fx + 0.5, fy + 0.5),
        syOf(fx + 0.5, fy + 0.5) - elevAt(fy),
        breathe * taper, 0);
    }
    // head
    {
      const fx = segFX[0], fy = segFY[0];
      const row = rows.get(clamp(Math.round(fy), rLo, rHi));
      const head = SPR.head[snake.dirName] || SPR.head.up;
      let hx = sxOf(fx + 0.5, fy + 0.5);
      let hy = syOf(fx + 0.5, fy + 0.5) - elevAt(fy);
      if (bumpT > 0) {
        const k = Math.sin((0.2 - bumpT) / 0.2 * Math.PI) * 7;
        hx += (bumpDX * AX + bumpDY * BX) / AX * k;
        hy += (bumpDX * AY + bumpDY * BY) / AX * k * 0.4;
      }
      const breathe = 1 + 0.03 * Math.sin(time * 2.3);
      entRec(row, fx, head, hx, hy, breathe, 0);
      // tongue flick
      const fl = (time % 2.4);
      if (fl < 0.34 && !snake.moving) {
        const ext = Math.sin(fl / 0.34 * Math.PI);
        entRec(row, fx - 0.01, SPR.tongue,
          hx + (head.tipX - head.ax) * 1, hy + (head.tipY) * 1, 0.6 + ext * 0.55, head.angle);
      }
    }
  }

  // ---- draw far to near: strip, then its bucket ----
  for (let r = rHi; r >= rLo; r--) {
    const row = rows.get(r);
    if (!row) continue;
    const strip = stripFor(row);
    blit(strip, sxOf(STRIP_GX0, r) - PADX, syOf(STRIP_GX0, r) - LY0);
    const ents = row.ents;
    if (ents.length) {
      if (ents.length > 1) ents.sort(entCmp);
      for (let i = 0; i < ents.length; i++) blitRec(ents[i]);
    }
  }
  for (let i = 0; i < stripEnts.length; i++) blitRec(stripEnts[i]);

  // the hungry dark, then the light
  blit(SPR.dark, 0, H - 170);
  blit(SPR.vig, -shX, -shY);

  // particles + popups
  for (const p of particles) {
    if (p.life <= 0) continue;
    ctx.globalAlpha = Math.min(1, p.life / p.max * 1.6);
    blitCount++;
    const s = p.sc * (0.6 + 0.7 * (p.life / p.max));
    ctx.drawImage(p.spr, p.x - 16 * s, p.y - 16 * s, 32 * s, 32 * s);
  }
  for (const p of popups) {
    if (p.life <= 0) continue;
    ctx.globalAlpha = Math.min(1, p.life * 2.2);
    blitCount++;
    ctx.drawImage(p.cv, p.x - p.cv.width / 2, p.y);
  }
  ctx.globalAlpha = 1;
  ctx.setTransform(1, 0, 0, 1, 0, 0);

  lastBlits = blitCount;
  lastEnts = entIdx;
}

// ---------- HUD ----------
let hudDirty = true;
const hudLen = document.getElementById('hudLen');
const hudScore = document.getElementById('hudScore');
const hudBest = document.getElementById('hudBest');
function updateHud() {
  if (!hudDirty) return;
  hudDirty = false;
  hudLen.innerHTML = 'LEN ' + snake.len + '<span class="mult">SCORE &times;' + snake.len + '</span>';
  hudScore.textContent = String(score);
  hudBest.innerHTML = 'BEST<br>' + Math.max(best, score);
}

// ============================================================
// MAIN LOOP
// ============================================================
let lastT = performance.now();
let frameCount = 0;
// Optional frame cap (?fps=30) for test rigs / vsync-off browsers.
const FPS_CAP = parseFloat(urlParams.get('fps')) || 0;
const MIN_FRAME_MS = FPS_CAP > 0 ? (1000 / FPS_CAP) - 1 : 0;
function frame(now) {
  requestAnimationFrame(frame);
  if (MIN_FRAME_MS && now - lastT < MIN_FRAME_MS) return;
  frameCount++;
  let dt = (now - lastT) / 1000;
  lastT = now;
  if (dt > 0.05) dt = 0.05;
  if (dt <= 0) dt = 0.001;

  if (overCooldown > 0) overCooldown -= dt;

  if (!(state === 'playing' && paused)) {
    time += dt;
    update(dt);
  }
  render();
  updateHud();
}
function update(dt) {
  if (state === 'title' || state === 'over') {
    updateTraffic(dt);
    updateRails(dt, false);
    updateParticles(dt);
    return;
  }
  // playing
  snake.invuln = Math.max(0, snake.invuln - dt);
  snake.bodyCd = Math.max(0, snake.bodyCd - dt);
  blockBuzzT -= dt;
  bumpT = Math.max(0, bumpT - dt);
  shakeT = Math.max(0, shakeT - dt * 2);

  updateSnakeMove(readHeldDir(), dt);
  if (state !== 'playing') return;
  updateTraffic(dt);
  updateRails(dt, true);

  const segCount = computeSegs();
  collide(segCount);
  if (state !== 'playing') return;
  darkEat(dt, segCount);
  if (state !== 'playing') return;
  updateCamera(dt);
  updateGates();
  updateMercy(dt);
  updateParticles(dt);

  genUpTo(Math.floor(cam) + 20);
  pruneRows(Math.floor(cam) - 6);
}

// ---------- scale to fit ----------
function fit() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  stage.style.transform = 'translate(' + (-W * s / 2) + 'px,' + (-H * s / 2) + 'px) scale(' + s + ')';
}
window.addEventListener('resize', fit);

// ---------- font-dependent rebakes ----------
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => {
    fontEpoch++;
    labelCache.clear();
  });
}

// ---------- boot ----------
function boot() {
  bakeSnake();
  bakeVehicles();
  bakeTrains();
  bakeSignal();
  bakeSnacks();
  bakeParticles();
  bakeDark();
  bakeVignette();
  fit();
  resetWorld();
  computeSegs();
  document.getElementById('hudBest').innerHTML = 'BEST<br>' + best;
  requestAnimationFrame(frame);
}
boot();

// ============================================================
// TEST HOOKS (harmless in production; used by the CDP harness)
// ============================================================
window.__HISS = {
  get state() { return state; },
  get paused() { return paused; },
  get len() { return snake.len; },
  get score() { return score; },
  get cam() { return cam; },
  get maxRow() { return snake.maxRow; },
  get invuln() { return snake.invuln; },
  get head() { return { x: headCellX(), y: headCellY() }; },
  get headF() { return { x: segFX[0], y: segFY[0] }; },
  get frameStats() { return { blits: lastBlits, ents: lastEnts, pathOps: 0 }; },
  get frames() { return frameCount; },
  get debug() { return { moving: snake.moving, dir: readHeldDir(), pathLen: snake.pathX.length, t: snake.t }; },
  get overReason() { return overReason; },
  set forceDir(d) { forceDir = d; },
  get forceDir() { return forceDir; },
  rowType(gy) { const r = rows.get(gy); return r ? r.type : null; },
  rowInfo(gy) {
    const r = rows.get(gy);
    if (!r) return null;
    return { type: r.type, snacks: r.snacks.map(s => ({ gx: s.gx, kind: s.kind })), gate: r.gate ? { req: r.gate.req, open: r.gate.open } : null, cars: r.cars ? r.cars.length : 0 };
  },
  findRow(type, from, to) {
    for (let g = from; g <= to; g++) { const r = rows.get(g); if (r && r.type === type) return g; }
    return -1;
  },
  teleport(gx, gy) {
    genUpTo(gy + 24);
    snake.pathX.length = 0; snake.pathY.length = 0;
    snake.pathX.push(gx, gx); snake.pathY.push(gy - 1, gy);
    snake.moving = false; snake.t = 0;
    snake.safeX = gx; snake.safeY = gy;
    snake.maxRow = Math.max(snake.maxRow, gy);
    cam = gy - 4;
    computeSegs();
  },
  layPath(cells) { // cells = [[gx,gy],...] tail→head (does not change length)
    snake.pathX.length = 0; snake.pathY.length = 0;
    for (const [x, y] of cells) { snake.pathX.push(x); snake.pathY.push(y); }
    snake.moving = false; snake.t = 0;
    computeSegs();
  },
  setLength(n) { snake.len = clamp(n, 1, MAXSEG); hudDirty = true; },
  setInvuln(s) { snake.invuln = s; },
  clearCars(gy) { const r = rows.get(gy); if (r && r.cars) r.cars.length = 0; },
  clearAllCars() { for (const r of rows.values()) if (r.cars) r.cars.length = 0; },
  spawnCar(gy, gx, dir, speed) {
    const r = rows.get(gy);
    if (!r) return false;
    if (!r.cars) { r.cars = []; r.lane = { dir, speed, gap: 4 }; }
    const dsg = SPR.veh[String(dir)][0];
    r.cars.push({ x: gx, hl: dsg.hl, cv: dsg.cv, phase: 0, hitT: 0 });
    r.lane.dir = dir; r.lane.speed = speed;
    return true;
  },
  addSnack(gy, gx, kind) { const r = rows.get(gy); if (r) addSnackTo(r, gx, kind || 'mouse'); },
  makeGate(gy, req) {
    const r = rows.get(gy);
    if (!r) return false;
    rows.set(gy, Object.assign(r, { type: 'gate', elev: GRASS_ELEV, cars: null, lane: null, rail: null, key: undefined, gate: { req, open: false, cv: null, baked: '', claimed: false } }));
    return true;
  },
  setCam(c) { cam = c; },
  confirm() { doConfirm(); },
};

})();
</script>
